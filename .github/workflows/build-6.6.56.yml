name: Build KSU ko for 6.6.56

on:
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: 'AOSP kernel tag (包含 android15-6.6 对应版本的内核源码)'
        required: false
        default: 'android15-6.6-2024-11_r22'
        type: string

jobs:
  build-ko:
    name: Build kernelsu.ko for kernel 6.6.56
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:android15-6.6-20260313
      options: --privileged

    steps:
      - name: Checkout KernelSU source
        uses: actions/checkout@v7
        with:
          path: kernelsu

      - name: Clone AOSP kernel source (${{ inputs.kernel_tag }})
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/common kernel-source
          cd kernel-source
          git fetch --depth=1 origin tag ${{ inputs.kernel_tag }}
          git checkout ${{ inputs.kernel_tag }}
          echo "=== Kernel version ==="
          head -5 Makefile
          echo "=== Directory structure ==="
          ls -la

      - name: Configure and build kernel
        run: |
          # 检测内核源码位置：可能在根目录或 common/ 下
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel-source"
          if [ -f "$KERNEL_DIR/common/Makefile" ]; then
            KERNEL_DIR="$KERNEL_DIR/common"
          fi
          echo "Kernel source dir: $KERNEL_DIR"
          cd "$KERNEL_DIR"
          make ARCH=arm64 LLVM=1 gki_defconfig
          make ARCH=arm64 LLVM=1 -j$(nproc) 2>&1 | tail -20
          echo "=== Kernel build done (Module.symvers generated) ==="

      - name: Build kernelsu.ko
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel-source"
          if [ -f "$KERNEL_DIR/common/Makefile" ]; then
            KERNEL_DIR="$KERNEL_DIR/common"
          fi
          echo "KERNEL_DIR=$KERNEL_DIR"
          echo "MODULE_DIR=$GITHUB_WORKSPACE/kernelsu/kernel"
          # CONFIG_KSU=m 必须作为 make 参数传递
          # KBUILD_MODPOST_WARN=1: 部分符号在 AOSP GKI 中未导出但 KSU 运行时通过 kallsyms 解析
          make -C "$KERNEL_DIR" \
            M=$GITHUB_WORKSPACE/kernelsu/kernel \
            ARCH=arm64 LLVM=1 \
            CONFIG_KSU=m \
            KBUILD_MODPOST_WARN=1 \
            -j$(nproc) modules
          echo "=== Build completed, checking artifacts ==="
          ls -la $GITHUB_WORKSPACE/kernelsu/kernel/*.ko 2>&1 || true
          find $GITHUB_WORKSPACE -name "*.ko" 2>/dev/null

      - name: Strip and copy
        run: |
          mkdir -p /github/workspace/out
          find $GITHUB_WORKSPACE -name "kernelsu.ko" -type f 2>/dev/null
          if [ -f $GITHUB_WORKSPACE/kernelsu/kernel/kernelsu.ko ]; then
            cp $GITHUB_WORKSPACE/kernelsu/kernel/kernelsu.ko /github/workspace/out/kernelsu_6.6.56.ko
          else
            # Try to find it anywhere
            KO=$(find $GITHUB_WORKSPACE -name "kernelsu.ko" -type f 2>/dev/null | head -1)
            if [ -n "$KO" ]; then
              cp "$KO" /github/workspace/out/kernelsu_6.6.56.ko
            else
              echo "ERROR: kernelsu.ko not found!"
              ls -la $GITHUB_WORKSPACE/kernelsu/kernel/
              exit 1
            fi
          fi
          echo "Size: $(du -h /github/workspace/out/kernelsu_6.6.56.ko | cut -f1)"
          llvm-strip -d /github/workspace/out/kernelsu_6.6.56.ko
          echo "Size after strip: $(du -h /github/workspace/out/kernelsu_6.6.56.ko | cut -f1)"
          ls -la /github/workspace/out/

      - name: Upload kernelsu.ko
        uses: actions/upload-artifact@v7
        with:
          name: kernelsu-6.6.56
          path: /github/workspace/out/kernelsu_6.6.56.ko
